name: cron-instagram-daily

# Renders the brand-comparison image and posts it to @fuelmap_armenia
# feed. Schedule: 07:00 UTC = 11:00 Yerevan, one hour after scrape so
# we read fresh prices.
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Hit /api/cron/instagram-daily
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu
          resp=$(curl -fsS --max-time 300 -w '\n%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://fuelmap.app/api/cron/instagram-daily)
          status=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | head -n -1)
          echo "HTTP $status"
          echo "Body: $body"
          [ "$status" = "200" ] || { echo "non-200 from handler"; exit 1; }
