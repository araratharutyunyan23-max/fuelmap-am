name: scrape-prices

# Refresh prices daily and on demand. The script is idempotent — it just
# upserts the current values from flashpetrol.am + globalpetrolprices.com
# into station_prices, so re-running is safe.

on:
  schedule:
    # 06:00 UTC = 10:00 Asia/Yerevan. Most networks set the day's price by
    # then; if a brand updates intra-day we'll just catch it tomorrow.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scrape-prices.mjs
