name: cron-instagram-story

# Renders the cheapest-Regular/Premium/LPG card and posts it as a 24h
# Story to @fuelmap_armenia. Schedule: 07:05 UTC = 11:05 Yerevan, 5
# min after the feed post so we don't double-spam followers.
on:
  schedule:
    - cron: '5 7 * * *'
  workflow_dispatch: {}

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Hit /api/cron/instagram-story-cheapest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu
          resp=$(curl -fsS --max-time 300 -w '\n%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://fuelmap.app/api/cron/instagram-story-cheapest)
          status=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | head -n -1)
          echo "HTTP $status"
          echo "Body: $body"
          [ "$status" = "200" ] || { echo "non-200 from handler"; exit 1; }
